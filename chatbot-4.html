<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJ AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f4f8;
    --surface: #ffffff;
    --surface2: #f0f0f7;
    --border: #dcdce8;
    --accent: #7c6af7;
    --accent2: #c084fc;
    --accent-glow: rgba(124,106,247,0.18);
    --text: #1a1a2e;
    --text-muted: #888899;
    --user-bg: linear-gradient(135deg, #7c6af7, #c084fc);
    --ai-bg: #ffffff;
    --radius: 18px;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,106,247,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(192,132,252,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  .app {
    width: 100%;
    max-width: 780px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }
  .header {
    padding: 20px 28px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    background: rgba(244,244,248,0.9);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }
  .logo {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: var(--user-bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 24px var(--accent-glow);
    flex-shrink: 0;
  }
  .header-info h1 {
    font-family: 'Syne', sans-serif;
    font-size: 17px; font-weight: 700;
    color: var(--text); letter-spacing: -0.3px;
  }
  .status {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-muted); font-weight: 300;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px rgba(74,222,128,0.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.6; transform:scale(0.85); }
  }
  .messages {
    flex: 1; overflow-y: auto;
    padding: 24px 24px 12px;
    display: flex; flex-direction: column; gap: 18px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .welcome {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; gap: 16px; padding: 40px 20px;
    animation: fadeUp 0.6s ease forwards;
  }
  .welcome-icon {
    width: 72px; height: 72px; border-radius: 20px;
    background: var(--user-bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    box-shadow: 0 0 40px var(--accent-glow);
    margin-bottom: 8px;
  }
  .welcome h2 {
    font-family: 'Syne', sans-serif;
    font-size: 26px; font-weight: 800;
    background: linear-gradient(135deg, var(--text) 40%, var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .welcome p {
    font-size: 15px; color: var(--text-muted);
    font-weight: 300; max-width: 340px; line-height: 1.6;
  }
  .suggestions {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center; margin-top: 8px;
  }
  .suggestion-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; padding: 9px 16px;
    border-radius: 50px; cursor: pointer;
    transition: all 0.2s; font-weight: 400;
  }
  .suggestion-btn:hover {
    border-color: var(--accent);
    background: rgba(124,106,247,0.1);
    color: var(--accent2);
    transform: translateY(-1px);
  }
  .message {
    display: flex; gap: 12px;
    animation: fadeUp 0.35s ease forwards;
    opacity: 0;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(12px); }
    to { opacity:1; transform:translateY(0); }
  }
  .message.user { flex-direction: row-reverse; }
  .avatar {
    width: 34px; height: 34px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0; margin-top: 2px;
  }
  .message.user .avatar {
    background: var(--user-bg);
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .message.ai .avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .bubble {
    max-width: 72%; padding: 13px 18px;
    border-radius: var(--radius);
    font-size: 14.5px; line-height: 1.65; font-weight: 400;
  }
  .message.user .bubble {
    background: var(--user-bg); color: #fff;
    border-bottom-right-radius: 5px;
    box-shadow: 0 4px 20px rgba(124,106,247,0.3);
  }
  .message.ai .bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 5px;
  }
  .bubble p { margin: 0; }
  .bubble p + p { margin-top: 10px; }
  .typing {
    display: flex; gap: 5px; align-items: center;
    padding: 16px 18px;
  }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s infinite; opacity: 0.7;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform:translateY(0); opacity:0.7; }
    30% { transform:translateY(-6px); opacity:1; }
  }
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: rgba(244,244,248,0.92);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }
  .input-wrapper {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 12px 10px 18px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  textarea {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px; font-weight: 400;
    resize: none; min-height: 24px; max-height: 140px;
    line-height: 1.55; overflow-y: auto;
  }
  textarea::placeholder { color: var(--text-muted); }
  .send-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--user-bg); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: white; transition: all 0.2s; flex-shrink: 0;
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .send-btn:hover:not(:disabled) {
    transform: scale(1.08);
    box-shadow: 0 0 24px rgba(124,106,247,0.5);
  }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }
  .hint {
    text-align: center; font-size: 11px;
    color: var(--text-muted); margin-top: 10px;
    opacity: 0.6; font-weight: 300;
  }
  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #dc2626; padding: 10px 16px;
    border-radius: 12px; font-size: 13px; text-align: center;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">✦</div>
    <div class="header-info">
      <h1>AJ AI</h1>
      <div class="status">
        <div class="status-dot"></div>
        সবসময় প্রস্তুত
      </div>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">✦</div>
      <h2>আমি AJ AI — কীভাবে সাহায্য করতে পারি?</h2>
      <p>যেকোনো প্রশ্ন করুন — বাংলায় বা ইংরেজিতে।</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="useSuggestion(this)">বাংলাদেশ সম্পর্কে বলো</button>
        <button class="suggestion-btn" onclick="useSuggestion(this)">Python শেখার উপায় কী?</button>
        <button class="suggestion-btn" onclick="useSuggestion(this)">একটি কবিতা লিখে দাও</button>
        <button class="suggestion-btn" onclick="useSuggestion(this)">স্বাস্থ্য টিপস দাও</button>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="input" placeholder="এখানে লিখুন..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="hint">Enter চাপুন পাঠাতে &nbsp;·&nbsp; Shift+Enter নতুন লাইন</div>
  </div>
</div>

<script>
  const GEMINI_API_KEY = 'AIzaSyBHVD30XL9BebIB8kanvvwqwgip1XddKgI';
  const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + GEMINI_API_KEY;
  const SYSTEM_MSG = 'তুমি একজন সহায়ক AI Assistant। তোমার নাম AJ AI। তোমাকে ABHIJIT বানিয়েছে। কেউ জিজ্ঞেস করলে সবসময় বলবে "আমাকে ABHIJIT বানিয়েছে। আমার নাম AJ AI।" কখনো বলবে না যে তুমি Gemini বা Google তোমাকে বানিয়েছে। ব্যবহারকারী বাংলায় কথা বললে বাংলায় উত্তর দাও, ইংরেজিতে কথা বললে ইংরেজিতে উত্তর দাও। সহজ ও সংক্ষিপ্ত ভাষায় উত্তর দাও।';

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  let welcomeEl = document.getElementById('welcome');
  let conversationHistory = [];
  let isLoading = false;

  inputEl.addEventListener('input', () => {
    sendBtn.disabled = !inputEl.value.trim() || isLoading;
  });

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  }

  function useSuggestion(btn) {
    inputEl.value = btn.textContent;
    sendBtn.disabled = false;
    autoResize(inputEl);
    sendMessage();
  }

  function addMessage(role, text) {
    if (welcomeEl) { welcomeEl.remove(); welcomeEl = null; }
    const msg = document.createElement('div');
    msg.className = 'message ' + role;
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '✦';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const parts = text.split(/\n\n+/);
    parts.forEach(part => {
      const p = document.createElement('p');
      p.textContent = part.trim();
      if (p.textContent) bubble.appendChild(p);
    });
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function addTyping() {
    if (welcomeEl) { welcomeEl.remove(); welcomeEl = null; }
    const msg = document.createElement('div');
    msg.className = 'message ai';
    msg.id = 'typing-indicator';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '✦';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addMessage('user', text);
    conversationHistory.push({ role: 'user', parts: [{ text: text }] });
    addTyping();

    try {
      const response = await fetch(GEMINI_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_MSG }] },
          contents: conversationHistory
        })
      });

      removeTyping();

      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData?.error?.message || 'API error ' + response.status);
      }

      const data = await response.json();
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'দুঃখিত, উত্তর পাওয়া যায়নি।';

      conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
      addMessage('ai', reply);

    } catch (err) {
      removeTyping();
      const errDiv = document.createElement('div');
      errDiv.className = 'error-msg';
      errDiv.textContent = '⚠️ সমস্যা হয়েছে: ' + err.message;
      messagesEl.appendChild(errDiv);
      scrollToBottom();
      conversationHistory.pop();
    }

    isLoading = false;
    sendBtn.disabled = !inputEl.value.trim();
    inputEl.focus();
  }
</script>
</body>
</html>
